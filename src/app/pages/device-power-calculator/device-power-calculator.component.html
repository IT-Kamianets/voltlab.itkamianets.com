<div class="page-grid">

  <!-- LEFT SIDE -->
  <div class="card">

    <div class="card-header">
      ⚡ Device Configuration
    </div>

    <div class="card-body">

      <div class="form-row">
        <label>Device</label>
        <select [(ngModel)]="selectedDeviceIndex">
          <option *ngFor="let device of devicePresets; let i = index" [value]="i">
            {{device.name}} ({{device.power}} W)
          </option>
        </select>
      </div>

      <div class="form-row">
        <label>Custom power (W)</label>
        <input type="number" [(ngModel)]="customPower">
      </div>

      <div class="form-row">
        <label>Usage hours</label>
        <input type="number" [(ngModel)]="hours">
      </div>

      <button class="btn-primary" (click)="addDevice()">
        Add Device
      </button>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="card">

    <div class="card-header">
      Calculation Results
    </div>

    <div class="result-row">
      <span>Total Power</span>
      <span>{{totalPower}} W</span>
    </div>

    <div class="result-row">
      <span>Energy Consumption</span>
      <span>{{totalEnergy}} Wh</span>
    </div>

    <div class="result-row">
      <span>Energy (kWh)</span>
      <span>{{totalEnergy/1000 | number:'1.2-2'}} kWh</span>
    </div>

    <div class="device-list">

      <div
        class="device-item"
        *ngFor="let device of devices; let i = index">

        {{device.name}} — {{device.power}} W

        <button (click)="removeDevice(i)">
          ✕
        </button>

      </div>

    </div>

  </div>

</div>
