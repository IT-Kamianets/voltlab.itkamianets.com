<div class="container">
  <h2>Device Power Calculator</h2>

  <!-- Device selector -->
  <div class="form-group">
    <label>Select device</label>
    <select [(ngModel)]="selectedDeviceIndex">
      <option *ngFor="let device of devicePresets; let i = index" [value]="i">
        {{ device.name }} ({{ device.power }} W)
      </option>
    </select>
  </div>

  <!-- Custom power -->
  <div class="form-group">
    <label>Custom power (W)</label>
    <input type="number" [(ngModel)]="customPower" placeholder="Enter power manually">
  </div>

  <!-- Hours -->
  <div class="form-group">
    <label>Usage hours</label>
    <input type="number" [(ngModel)]="hours">
  </div>

  <button (click)="addDevice()">Add Device</button>

  <hr>

  <h3>Added Devices</h3>
  <ul>
    <li *ngFor="let device of devices; let i = index">
      {{ device.name }} – {{ device.power }} W
      <button (click)="removeDevice(i)">X</button>
    </li>
  </ul>

  <hr>

  <h3>Total Power: {{ totalPower }} W</h3>
  <h3>Total Energy: {{ totalEnergy }} Wh</h3>
  <h3>Total Energy: {{ totalEnergy / 1000 | number:'1.2-2' }} kWh</h3>
</div>
