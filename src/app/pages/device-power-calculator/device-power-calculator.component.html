<div class="page-grid">

  <!-- LEFT SIDE -->
  <div class="card">

    <div class="card-header">
      ⚡ Device Configuration
    </div>

    <div class="card-body">

      <!-- Device -->
      <div class="form-row">
        <label>Device</label>

        <select [(ngModel)]="selectedDeviceIndex">
          <option
            *ngFor="let device of devicePresets; let i = index"
            [value]="i"
          >
            {{ device.name }} ({{ device.power }} W)
          </option>
        </select>
      </div>

      <!-- Custom power -->
      <div class="form-row">
        <label>Custom power (W)</label>

        <input
          type="number"
          [(ngModel)]="customPower"
          placeholder="Enter power"
        >
      </div>

      <!-- Hours -->
      <div class="form-row">
        <label>Usage hours</label>

        <input
          type="number"
          [(ngModel)]="hours"
          min="1"
        >
      </div>

      <!-- Button -->
      <button class="add-btn" (click)="addDevice()">
        Add Device
      </button>

    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="card">

    <div class="card-header">
      📊 Results
    </div>

    <div class="card-body">

      <div class="result-box">
        <span>Total devices:</span>
        <strong>{{ devices.length }}</strong>
      </div>

      <div class="result-box">
        <span>Total power:</span>
        <strong>{{ totalPower }} W</strong>
      </div>

      <div class="result-box">
        <span>Daily usage:</span>
        <strong>{{ totalEnergy }} Wh/day</strong>
      </div>

      <div class="devices-list">

        <div
          class="device-item"
          *ngFor="let device of devices; let i = index"
        >
          <div>
            <strong>{{ device.name }}</strong>
            <div>{{ device.power }} W × {{ device.hours }} h</div>
          </div>

          <button class="remove-btn" (click)="removeDevice(i)">
            ✕
          </button>
        </div>

      </div>

    </div>
  </div>

</div>
